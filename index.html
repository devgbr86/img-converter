<!doctype html>
<html lang="pt-BR">

<head>
     <meta charset="utf-8" />
     <meta name="viewport" content="width=device-width,initial-scale=1" />
     <title>img-converter</title>
     <link rel="stylesheet" href="./src/styles/main.css" />
</head>

<body>

     <header class="app-header">
          <div>
               <h1>img-converter</h1>
               <p>PNG · JPG · WebP — processamento local, zero upload</p>
          </div>
          <span class="badge">client-side only</span>
     </header>

     <main class="card">

          <div class="upload-row">
               <label class="upload-btn">
                    <input id="file" type="file" accept="image/*" multiple>
                    + Selecionar
               </label>
               <div id="drop" class="drop-zone" tabindex="0">
                    Arraste imagens aqui
               </div>
          </div>

          <div class="controls">
               <div class="control-group">
                    <label for="format">Formato</label>
                    <select id="format">
                         <option value="image/png">PNG</option>
                         <option value="image/jpeg">JPG</option>
                         <option value="image/webp">WebP</option>
                    </select>
               </div>
               <div class="spacer"></div>
               <button id="convert" class="action-btn convert-btn">Converter Todas</button>
               <button id="downloadAll" class="action-btn download-all-btn">Baixar Todas</button>
          </div>

          <div class="divider"></div>

          <div class="thumbs" id="thumbs"></div>

     </main>

     <footer class="app-footer">
          <span>Conversão via <code>&lt;canvas&gt;</code> + <code>toBlob()</code></span>
          <a href="https://github.com/devgbr86">@devgbr86</a>
     </footer>

     <script type="module" src="./src/main.js"></script>
</body>

</html>
